name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared:
    name: Shared TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @guesseat/shared lint

  web:
    name: Web build + lint
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @guesseat/web lint
      - run: pnpm --filter @guesseat/web build

  mobile:
    name: Mobile TypeScript
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @guesseat/mobile lint

  api:
    name: Laravel tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_DB: guesseat
          POSTGRES_USER: guesseat
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U guesseat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: guesseat
      DB_USERNAME: guesseat
      DB_PASSWORD: secret
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      FILESYSTEM_DISK: local
      OTP_DRIVER: dev
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, gd, exif, zip, redis
          coverage: none
      - name: Create bootstrap/cache
        run: mkdir -p bootstrap/cache
        working-directory: packages/api
      - name: Composer validate
        run: composer validate --strict --no-check-publish
        working-directory: packages/api
      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        working-directory: packages/api
      - name: Composer audit
        run: composer audit
        working-directory: packages/api
      - name: Pint
        run: vendor/bin/pint --test
        working-directory: packages/api
      - name: Tests
        run: php artisan test
        working-directory: packages/api